<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4338ca">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ScamShield">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%234338ca' width='192' height='192'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>S</text></svg>">
  <title>ScamShield - Login & Register</title>
  <style>
    /* === Reset & Base === */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', Arial, sans-serif;
      background: linear-gradient(135deg, #4338ca, #7e22ce, #db2777);
      background-size: 200% 200%;
      animation: gradientMove 15s ease infinite;
      color: #fff;
      overflow: hidden;
    }
    @keyframes gradientMove {
      0% { background-position: 0 0; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0 0; }
    }

    /* Floating Circles */
    @keyframes float {
      0% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-20px) translateX(10px); }
      100% { transform: translateY(0) translateX(0); }
    }
    .floating {
      position: absolute;
      border-radius: 50%;
      animation: float 8s ease-in-out infinite;
    }

    /* Particles */
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: drift 15s linear infinite;
    }
    @keyframes drift {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(-800px); opacity: 0; }
    }

    /* Cobweb */
    .cobweb {
      position: absolute;
      width: 180px;
      height: 180px;
      opacity: 0.35;
      pointer-events: none;
      transition: transform 0.3s ease-out;
    }
    .cobweb svg { width: 100%; height: 100%; }
    .cobweb.tl { top: 0; left: 0; }
    .cobweb.tr { top: 0; right: 0; }
    .cobweb.bl { bottom: 0; left: 0; }
    .cobweb.br { bottom: 0; right: 0; }

    /* Glass container */
    .glass {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 30px;
      width: 360px;
      text-align: center;
      position: relative;
      z-index: 10;
      box-shadow: 0 0 30px rgba(99,102,241,0.6), 0 0 60px rgba(236,72,153,0.4);
      animation: pulseGlow 4s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 30px rgba(99,102,241,0.6), 0 0 60px rgba(236,72,153,0.4); }
      50% { box-shadow: 0 0 50px rgba(139,92,246,0.8), 0 0 100px rgba(236,72,153,0.6); }
    }

    h2 {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #fff;
      text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
    }

    /* Language Selector */
    .lang-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      justify-content: center;
    }

    .lang-btn {
      padding: 6px 12px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .lang-btn.active {
      background: #fff;
      color: #4338ca;
      border-color: #fff;
    }

    .lang-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    /* Inputs */
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.2);
      color: #fff;
      margin-bottom: 12px;
      font-size: 14px;
      outline: none;
      font-family: 'DM Sans', Arial, sans-serif;
    }
    input::placeholder { color: #e2e2e2; }
    input:focus { border-color: #ec4899; background: rgba(255,255,255,0.3); }

    /* Buttons */
    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(to right, #ec4899, #7e22ce);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s;
      font-family: 'DM Sans', Arial, sans-serif;
    }
    button:hover { transform: scale(1.05); }
    button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 200%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
      transition: all 0.6s;
    }
    button:hover::before { left: 100%; }

    .voice-btn {
      width: 40px;
      padding: 0;
      margin-bottom: 12px;
      margin-left: auto;
      margin-right: auto;
      display: block;
      background: rgba(255,255,255,0.2);
    }

    .voice-btn:hover {
      background: rgba(255,255,255,0.4);
    }

    .voice-btn.active {
      background: #00e5b0;
      color: #000;
    }

    .switch-text {
      font-size: 14px;
      color: #e0e0e0;
      margin-top: 10px;
    }
    .switch-text span {
      color: #fbcfe8;
      cursor: pointer;
      text-decoration: underline;
    }

    /* Loader */
    #loader {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0%{transform:rotate(0)}100%{transform:rotate(360deg)} }

    /* Layout: Floating circles */
    .circle1 { top: 40px; left: 80px; width: 160px; height: 160px; background: rgba(236,72,153,0.3); }
    .circle2 { bottom: 100px; right: 160px; width: 130px; height: 130px; background: rgba(99,102,241,0.3); }
    .circle3 { top: 50%; right: 40px; width: 100px; height: 100px; background: rgba(168,85,247,0.3); }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      z-index: 999;
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateX(-50%) translateY(100px);
        opacity: 0;
      }
      to {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      .glass {
        width: 90%;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Cobwebs -->
  <div class="cobweb tl">
    <svg viewBox="0 0 100 100" stroke="white" fill="none" stroke-width="0.5">
      <circle cx="0" cy="0" r="20"></circle>
      <circle cx="0" cy="0" r="40"></circle>
      <circle cx="0" cy="0" r="60"></circle>
      <circle cx="0" cy="0" r="80"></circle>
      <line x1="0" y1="0" x2="100" y2="0"></line>
      <line x1="0" y1="0" x2="0" y2="100"></line>
      <line x1="0" y1="0" x2="100" y2="100"></line>
      <line x1="0" y1="0" x2="50" y2="100"></line>
    </svg>
  </div>
  <div class="cobweb tr">
    <svg viewBox="0 0 100 100" stroke="white" fill="none" stroke-width="0.5">
      <circle cx="100" cy="0" r="20"></circle>
      <circle cx="100" cy="0" r="40"></circle>
      <circle cx="100" cy="0" r="60"></circle>
      <circle cx="100" cy="0" r="80"></circle>
      <line x1="100" y1="0" x2="0" y2="0"></line>
      <line x1="100" y1="0" x2="100" y2="100"></line>
      <line x1="100" y1="0" x2="0" y2="100"></line>
      <line x1="100" y1="0" x2="50" y2="100"></line>
    </svg>
  </div>
  <div class="cobweb bl">
    <svg viewBox="0 0 100 100" stroke="white" fill="none" stroke-width="0.5">
      <circle cx="0" cy="100" r="20"></circle>
      <circle cx="0" cy="100" r="40"></circle>
      <circle cx="0" cy="100" r="60"></circle>
      <circle cx="0" cy="100" r="80"></circle>
      <line x1="0" y1="100" x2="100" y2="100"></line>
      <line x1="0" y1="100" x2="0" y2="0"></line>
      <line x1="0" y1="100" x2="100" y2="0"></line>
      <line x1="0" y1="100" x2="50" y2="0"></line>
    </svg>
  </div>
  <div class="cobweb br">
    <svg viewBox="0 0 100 100" stroke="white" fill="none" stroke-width="0.5">
      <circle cx="100" cy="100" r="20"></circle>
      <circle cx="100" cy="100" r="40"></circle>
      <circle cx="100" cy="100" r="60"></circle>
      <circle cx="100" cy="100" r="80"></circle>
      <line x1="100" y1="100" x2="0" y2="100"></line>
      <line x1="100" y1="100" x2="100" y2="0"></line>
      <line x1="100" y1="100" x2="0" y2="0"></line>
      <line x1="100" y1="100" x2="50" y2="0"></line>
    </svg>
  </div>

  <!-- Floating Circles -->
  <div class="floating circle1"></div>
  <div class="floating circle2"></div>
  <div class="floating circle3"></div>

  <!-- Particles -->
  <div id="particles"></div>

  <!-- Form -->
  <div class="glass">
    <h2 id="form-title">🛡️ ScamShield</h2>

    <div class="lang-selector">
      <button class="lang-btn active" onclick="changeLanguage('en')">EN</button>
      <button class="lang-btn" onclick="changeLanguage('hi')">HI</button>
      <button class="lang-btn" onclick="changeLanguage('kn')">KN</button>
    </div>

    <button class="voice-btn" id="voiceToggle" title="Toggle Voice">🔊</button>

    <form id="loginForm">
      <input type="text" id="loginName" placeholder="Name" required />
      <input type="password" id="loginPassword" placeholder="Password" required />
      <button type="submit" data-i18n="login">Login</button>
      <div class="switch-text">
        <span data-i18n="no_account">Don't have an account?</span> <span onclick="toggleForm('register')" data-i18n="register">Register</span>
      </div>
    </form>

    <form id="registerForm" style="display:none;">
      <input type="text" id="regName" placeholder="Name" required />
      <input type="email" id="regEmail" placeholder="Email" required />
      <input type="password" id="regPassword" placeholder="Password" required />
      <button type="submit" data-i18n="register">Register</button>
      <div class="switch-text">
        <span data-i18n="have_account">Already have an account?</span> <span onclick="toggleForm('login')" data-i18n="login">Login</span>
      </div>
    </form>
  </div>

  <!-- Loader -->
  <div id="loader">
    <div class="spinner"></div>
  </div>

  <script>
    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    // Internationalization
    const translations = {
      en: {
        login: "Login",
        register: "Register",
        no_account: "Don't have an account?",
        have_account: "Already have an account?",
        registered: "✅ Registered successfully! Please login.",
        login_success: "✅ Login successful! Redirecting...",
        login_failed: "❌ Invalid credentials",
        register_error: "❌ Registration error",
        email_exists: "❌ Email already registered",
        network_error: "❌ Network error occurred",
        voice_on: "Voice enabled",
        voice_off: "Voice disabled"
      },
      hi: {
        login: "लॉगिन करें",
        register: "पंजीकृत करें",
        no_account: "खाता नहीं है?",
        have_account: "पहले से खाता है?",
        registered: "✅ सफलतापूर्वक पंजीकृत! कृपया लॉगिन करें।",
        login_success: "✅ लॉगिन सफल! पुनर्निर्देशित हो रहे हैं...",
        login_failed: "❌ अमान्य क्रेडेंशियल",
        register_error: "❌ पंजीकरण त्रुटि",
        email_exists: "❌ ईमेल पहले से पंजीकृत है",
        network_error: "❌ नेटवर्क त्रुटि हुई",
        voice_on: "आवाज सक्षम",
        voice_off: "आवाज अक्षम"
      },
      kn: {
        login: "ಲಾಗಿನ್ ಮಾಡಿ",
        register: "ನೋಂದಾಯಿಸಿ",
        no_account: "ಖಾತೆ ಇಲ್ಲವೇ?",
        have_account: "ಈಗಾಗಲೇ ಖಾತೆ ಹೊಂದಿದ್ದೀರಿ?",
        registered: "✅ ಯಶಸ್ವಿಯಾಗಿ ನೋಂದಾಯಿತ! ದಯವಿಟ್ಟು ಲಾಗಿನ್ ಮಾಡಿ।",
        login_success: "✅ ಲಾಗಿನ್ ಯಶಸ್ವಿ! ಪುನರ್ನಿರ್ದೇಶನ ಮಾಡುತ್ತಿದೆ...",
        login_failed: "❌ ಅಮಾನ್ಯ ಪ್ರವೇಶಾಂಶ",
        register_error: "❌ ನೋಂದಾಯಿಸುವಿಕೆ ದೋಷ",
        email_exists: "❌ ಇಮೇಲ್ ಈಗಾಗಲೇ ನೋಂದಾಯಿತ",
        network_error: "❌ ನೆಟ್ವರ್ಕ್ ದೋಷ ಸಂಭವಿಸಿದೆ",
        voice_on: "ಧ್ವನಿ ಸಕ್ರಿಯ",
        voice_off: "ಧ್ವನಿ ನಿಷ್ಕ್ರಿಯ"
      }
    };

    let currentLanguage = 'en';
    let voiceEnabled = true;

    // Update UI text
    function updateLanguage() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[currentLanguage][key]) {
          el.textContent = translations[currentLanguage][key];
        }
      });

      document.querySelectorAll('.lang-btn').forEach((btn, idx) => {
        btn.classList.remove('active');
      });
      document.querySelectorAll('.lang-btn')[currentLanguage === 'en' ? 0 : currentLanguage === 'hi' ? 1 : 2].classList.add('active');
    }

    function changeLanguage(lang) {
      currentLanguage = lang;
      localStorage.setItem('language', lang);
      updateLanguage();
      speak(translations[lang]['voice_on']);
    }

    // Text-to-Speech
    function speak(text) {
      if (!voiceEnabled) return;
      
      window.speechSynthesis.cancel();
      
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = currentLanguage === 'hi' ? 'hi-IN' : currentLanguage === 'kn' ? 'kn-IN' : 'en-US';
      utterance.rate = 0.95;
      utterance.pitch = 1;
      utterance.volume = 1;
      
      window.speechSynthesis.speak(utterance);
    }

    // Voice Toggle
    document.getElementById('voiceToggle').addEventListener('click', function() {
      voiceEnabled = !voiceEnabled;
      this.classList.toggle('active');
      speak(voiceEnabled ? translations[currentLanguage]['voice_on'] : translations[currentLanguage]['voice_off']);
    });

    // Form Toggle
    function toggleForm(type) {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("registerForm").style.display = "none";
      document.getElementById("form-title").innerText = type === "login" ? "🛡️ ScamShield" : "🛡️ ScamShield";
      document.getElementById(type + "Form").style.display = "block";
      speak(translations[currentLanguage][type]);
    }

    const loader = document.getElementById("loader");

    // Register
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      loader.style.display = "flex";
      try {
        const name = document.getElementById("regName").value;
        const email = document.getElementById("regEmail").value;
        const password = document.getElementById("regPassword").value;

        const res = await fetch("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();
        if (res.ok) {
          showToast(translations[currentLanguage]['registered']);
          speak(translations[currentLanguage]['registered']);
          toggleForm("login");
        } else {
          const msg = data.message.includes("Email") ? translations[currentLanguage]['email_exists'] : translations[currentLanguage]['register_error'];
          showToast(msg);
          speak(msg);
        }
      } catch {
        const msg = translations[currentLanguage]['network_error'];
        showToast(msg);
        speak(msg);
      } finally {
        loader.style.display = "none";
      }
    });

    // Login
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      loader.style.display = "flex";
      try {
        const name = document.getElementById("loginName").value;
        const password = document.getElementById("loginPassword").value;

        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, password })
        });

        const data = await res.json();
        if (res.ok) {
          localStorage.setItem("username", data.user.name);
          localStorage.setItem("email", data.user.email);
          localStorage.setItem("language", currentLanguage);
          showToast(translations[currentLanguage]['login_success']);
          speak(translations[currentLanguage]['login_success']);
          setTimeout(() => {
            window.location.href = "ayu.html";
          }, 1000);
        } else {
          const msg = translations[currentLanguage]['login_failed'];
          showToast(msg);
          speak(msg);
        }
      } catch {
        const msg = translations[currentLanguage]['network_error'];
        showToast(msg);
        speak(msg);
      } finally {
        loader.style.display = "none";
      }
    });

    // Particles
    const particlesContainer = document.getElementById("particles");
    for (let i = 0; i < 40; i++) {
      const p = document.createElement("div");
      p.className = "particle";
      p.style.left = Math.random() * window.innerWidth + "px";
      p.style.top = Math.random() * window.innerHeight + "px";
      p.style.animationDuration = 10 + Math.random() * 20 + "s";
      particlesContainer.appendChild(p);
    }

    // Cobweb move
    const cobwebs = document.querySelectorAll(".cobweb");
    document.addEventListener("mousemove", (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 30;
      const y = (e.clientY / window.innerHeight - 0.5) * 30;
      cobwebs.forEach((cob, i) => {
        cob.style.transform = `translate(${x * (i % 2 === 0 ? 1 : -1)}px, ${y * (i < 2 ? 1 : -1)}px) scale(1.05)`;
      });
    });
    document.addEventListener("mouseleave", () => {
      cobwebs.forEach((cob) => (cob.style.transform = "translate(0,0) scale(1)"));
    });

    // Toast
    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, 3000);
    }

    // Initialize
    currentLanguage = localStorage.getItem('language') || 'en';
    updateLanguage();
  </script>
</body>
</html>
